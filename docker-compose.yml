version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3002:3002"
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - backend-uploads:/usr/src/app/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  backend-uploads:

networks:
  app-network:
    driver: bridge
