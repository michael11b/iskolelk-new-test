name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tags
        run: |
          echo "BACKEND_TAG=backend-$(date +%s)" >> $GITHUB_ENV
          echo "FRONTEND_TAG=frontend-$(date +%s)" >> $GITHUB_ENV

      - name: Build and push backend image
        working-directory: backend
        run: |
          IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            -t ${IMAGE_PREFIX}/backend:latest \
            -t ${IMAGE_PREFIX}/backend:${{ env.BACKEND_TAG }} \
            --push .

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.FRONTEND_NEXT_PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL_FILES=${{ secrets.FRONTEND_NEXT_PUBLIC_API_BASE_URL_FILES }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.FRONTEND_NEXT_PUBLIC_SITE_URL }} \
            --build-arg NEXT_PUBLIC_FILES_PUBLIC_DOMAIN=${{ secrets.NEXT_PUBLIC_FILES_PUBLIC_DOMAIN }} \
            -t ${IMAGE_PREFIX}/frontend:latest \
            -t ${IMAGE_PREFIX}/frontend:${{ env.FRONTEND_TAG }} \
            --push .
      # - name: Build and push frontend image
      #   working-directory: frontend
      #   run: |
      #     docker buildx build \
      #       --platform linux/amd64 \
      #       --no-cache \
      #       --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
      #       --build-arg NEXT_PUBLIC_API_BASE_URL_FILES=${{ secrets.NEXT_PUBLIC_API_BASE_URL_FILES }} \
      #       --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
      #       -t $DOCKER_REPO/frontend:latest \
      #       -t $DOCKER_REPO/frontend:${{ env.FRONTEND_TAG }} \
      #       --push .

      - name: Create backend Kubernetes Secret manifest
        run: |
          cat <<EOF > k8s/backend-secret.yaml
          apiVersion: v1
          kind: Secret
          metadata:
            name: backend-secret
          type: Opaque
          stringData:
            MONGO_URI: "${{ secrets.MONGO_URI }}"
            SESSION_SECRET: "${{ secrets.SESSION_SECRET }}"
            JWT_SECRET: "${{ secrets.JWT_SECRET }}"
            JWT_EXPIRES_IN: "${{ secrets.JWT_EXPIRES_IN }}"
            JWT_COOKIE_EXPIRES_IN: "${{ secrets.JWT_COOKIE_EXPIRES_IN }}"
            AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
            AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            AWS_REGION: "${{ secrets.AWS_REGION }}"
            AWS_BUCKET_NAME: "${{ secrets.AWS_BUCKET_NAME }}"
            R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
            R2_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
            R2_ENDPOINT: "${{ secrets.R2_ENDPOINT }}"
            R2_BUCKET_NAME: "${{ secrets.R2_BUCKET_NAME }}"
            PORT: "${{ secrets.PORT }}"
          EOF

      - name: Install kubectl
        run: |
          sudo apt-get update && sudo apt-get install -y curl gettext
          curl -LO "https://dl.k8s.io/release/v1.32.6/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DEDICATED_ISKOLELK_SERVER }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Bootstrap cluster prerequisites (optional)
        run: |
          K8S_AUTO_BOOTSTRAP="${{ secrets.K8S_AUTO_BOOTSTRAP }}"
          K8S_INGRESS_CLASS="${{ secrets.K8S_INGRESS_CLASS }}"
          if [ -z "$K8S_AUTO_BOOTSTRAP" ]; then
            K8S_AUTO_BOOTSTRAP="false"
          fi

          if [ "$K8S_AUTO_BOOTSTRAP" != "true" ]; then
            echo "Skipping cluster bootstrap (K8S_AUTO_BOOTSTRAP=$K8S_AUTO_BOOTSTRAP)"
            exit 0
          fi

          echo "Bootstrap enabled. Ensuring ingress class '$K8S_INGRESS_CLASS' and cert-manager exist."

          # Install ingress-nginx only when nginx class is requested and missing.
          if [ "$K8S_INGRESS_CLASS" = "nginx" ] && ! kubectl get ingressclass nginx >/dev/null 2>&1; then
            echo "Installing ingress-nginx..."
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
            kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=300s
          fi

          # Traefik is typically managed by k3s itself.
          if [ "$K8S_INGRESS_CLASS" = "traefik" ] && ! kubectl get ingressclass traefik >/dev/null 2>&1; then
            echo "Error: traefik ingress class not found. Install/configure Traefik on cluster first."
            exit 1
          fi

          # Install cert-manager CRDs/controllers if missing.
          if ! kubectl get crd certificates.cert-manager.io >/dev/null 2>&1; then
            echo "Installing cert-manager..."
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
            kubectl rollout status deployment/cert-manager -n cert-manager --timeout=300s
            kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=300s
            kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=300s
          fi

          # Final visibility for debugging.
          kubectl get ingressclass
          kubectl get pods -n cert-manager || true

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ secrets.GHCR_USERNAME }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --docker-email=noreply@github.com \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject image tags and deploy to Kubernetes
        run: |
          export BACKEND_TAG=${{ env.BACKEND_TAG }}
          export FRONTEND_TAG=${{ env.FRONTEND_TAG }}
          export IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          export K8S_INGRESS_CLASS="${{ secrets.K8S_INGRESS_CLASS }}"
          export K8S_CLUSTER_ISSUER="${{ secrets.K8S_CLUSTER_ISSUER }}"
          export K8S_FRONTEND_HOST="${{ secrets.K8S_FRONTEND_HOST }}"
          export K8S_API_HOST="${{ secrets.K8S_API_HOST }}"
          export K8S_TLS_SECRET_NAME="${{ secrets.K8S_TLS_SECRET_NAME }}"
          export K8S_AUTO_BOOTSTRAP="${{ secrets.K8S_AUTO_BOOTSTRAP }}"
          if [ -z "$K8S_AUTO_BOOTSTRAP" ]; then
            export K8S_AUTO_BOOTSTRAP="false"
          fi
          
          # Validate that tags are set
          if [ -z "$BACKEND_TAG" ] || [ -z "$FRONTEND_TAG" ]; then
            echo "Error: BACKEND_TAG or FRONTEND_TAG is not set"
            exit 1
          fi

          # Validate required Kubernetes deployment variables
          if [ -z "$K8S_INGRESS_CLASS" ] || [ -z "$K8S_CLUSTER_ISSUER" ] || [ -z "$K8S_FRONTEND_HOST" ] || [ -z "$K8S_API_HOST" ] || [ -z "$K8S_TLS_SECRET_NAME" ]; then
            echo "Error: One or more required K8S_* secrets are missing"
            exit 1
          fi

          # Validate ingress class exists in target cluster
          if ! kubectl get ingressclass "$K8S_INGRESS_CLASS" >/dev/null 2>&1; then
            echo "Error: IngressClass '$K8S_INGRESS_CLASS' not found on cluster"
            kubectl get ingressclass || true
            exit 1
          fi
          
          # Generate deployment files
          envsubst < k8s/backend-deployment.tpl.yaml > k8s/backend-deployment.yaml
          envsubst < k8s/frontend-deployment.tpl.yaml > k8s/frontend-deployment.yaml
          envsubst < k8s/ingress.tpl.yaml > k8s/ingress.yaml
          
          # Verify substitution worked (check for unsubstituted variables)
          if grep -q '\${' k8s/backend-deployment.yaml || grep -q '\${' k8s/frontend-deployment.yaml || grep -q '\${' k8s/ingress.yaml; then
            echo "Error: Variable substitution failed. Unsubstituted variables found in deployment files."
            exit 1
          fi
          
          # Verify image tags are present in generated files
          if ! grep -q "image: ${IMAGE_PREFIX}/backend:${BACKEND_TAG}" k8s/backend-deployment.yaml; then
            echo "Error: Backend image tag not found in generated deployment file"
            exit 1
          fi
          
          if ! grep -q "image: ${IMAGE_PREFIX}/frontend:${FRONTEND_TAG}" k8s/frontend-deployment.yaml; then
            echo "Error: Frontend image tag not found in generated deployment file"
            exit 1
          fi
          
          echo "Deployment files validated successfully"
          echo "Backend image: ${IMAGE_PREFIX}/backend:${BACKEND_TAG}"
          echo "Frontend image: ${IMAGE_PREFIX}/frontend:${FRONTEND_TAG}"
          
          kubectl apply -f k8s/
